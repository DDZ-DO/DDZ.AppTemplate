services:
  api:
    image: ddzdo/ddz-__appname__:latest
    container_name: __appname__-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DDZ_POSTGRES_HOST=postgres
      - DDZ_POSTGRES_DATABASE=${POSTGRES_DB:-ddz-__appname__}
      - DDZ_POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER muss gesetzt sein}
      - DDZ_POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}
      - Nats__Url=${NATS_URL:-nats://nats:4222}
      - DDZ_JWT_SECRET=${DDZ_JWT_SECRET:?DDZ_JWT_SECRET muss gesetzt sein}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ddz-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: __appname__-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ddz-__appname__}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER muss gesetzt sein}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ddz-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  ddz-net:
    external: true
