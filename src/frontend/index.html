<!doctype html>
<html lang="de" style="width: 100%; margin: 0; padding: 0; overflow-x: hidden;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2D3748" />
    <title>DDZ __AppName__</title>
    <script>
      (function() {
        const theme = localStorage.getItem('ddz___appname___theme');
        if (theme === 'dark' || (theme === 'system' || !theme) && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body style="width: 100%; margin: 0; padding: 0; overflow-x: hidden;">
    <div id="root" style="width: 100%; min-width: 100%;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
